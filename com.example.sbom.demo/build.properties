# build.properties – controls what Tycho packs into the final plugin jar.
#
# lib/ is NOT committed; it is populated at build time by maven-dependency-plugin
# (see com.example.sbom.demo/pom.xml, execution "copy-embedded-jars").
# Tycho reads bin.includes from the *project directory*, so lib/ must exist
# on disk before the package phase runs.

bin.includes = META-INF/,\
               .,\
               lib/
